services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-osint-secret-pw}
      MYSQL_DATABASE: osint_framework
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - osint

  engine:
    build: ./osint-engine
    environment:
      ENGINE_HOST: "0.0.0.0"
      ENGINE_PORT: "8077"
      ENGINE_SHARED_SECRET: ${ENGINE_SHARED_SECRET:-docker-secret-change-me}
      ENGINE_UPLOADS_DIR: /app/storage/app/uploads
    volumes:
      - uploads:/app/storage/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8077/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - osint

  web:
    build: ./osint-web
    command: serve
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${WEB_PORT:-8000}
      APP_NAME: ${APP_NAME:-OSINT Framework}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: osint_framework
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-osint-secret-pw}
      OSINT_ENGINE_URL: http://engine:8077
      OSINT_ENGINE_SECRET: ${ENGINE_SHARED_SECRET:-docker-secret-change-me}
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      RUN_MIGRATIONS: "true"
    volumes:
      - uploads:/app/storage/app/uploads
    healthcheck:
      test: ["CMD", "php", "artisan", "migrate:status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      engine:
        condition: service_healthy
    networks:
      - osint

  queue:
    build: ./osint-web
    command: queue
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${WEB_PORT:-8000}
      APP_NAME: ${APP_NAME:-OSINT Framework}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: osint_framework
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-osint-secret-pw}
      OSINT_ENGINE_URL: http://engine:8077
      OSINT_ENGINE_SECRET: ${ENGINE_SHARED_SECRET:-docker-secret-change-me}
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      RUN_MIGRATIONS: "false"
    volumes:
      - uploads:/app/storage/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - osint

volumes:
  mysql_data:
  uploads:

networks:
  osint:
