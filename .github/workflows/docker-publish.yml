name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual trigger from GitHub UI

env:
  WEB_IMAGE: edimemune/sk1ds-osint-framework-web
  ENGINE_IMAGE: edimemune/sk1ds-osint-framework-engine

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./osint-web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push engine image
        uses: docker/build-push-action@v6
        with:
          context: ./osint-engine
          push: true
          tags: |
            ${{ env.ENGINE_IMAGE }}:latest
            ${{ env.ENGINE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
